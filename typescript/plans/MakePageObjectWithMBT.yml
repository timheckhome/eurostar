title: Instructions for GitHub Copilot to Create a TypeScript Page Object with MBT

source_of_truth:
  allowed_documents:
    - typescript/docs/PageObjectPattern.md
    - typescript/docs/modelDrivenTestingPattern.MD
  restriction: Do not inspect or infer patterns from any other repository files.

goal: Create a TypeScript page object that is fully compliant with both source documents.

required_process:
  - Read both source documents completely before generating code.
  - Ask for any missing inputs required to generate the page object.
  - Generate the page object strictly from documented rules.
  - If a needed behavior is not explicitly defined in the two documents, ask the user instead of guessing.

required_inputs:
  - class_name
  - supported_fields_and_selectors
  - clickable_elements
  - read_only_fields
  - route_or_navigation_details_if_needed

minimal_compliance_checks:
  - Confirm page object pattern requirements are satisfied.
  - Confirm MBT requirements are satisfied, including fillForm and validateForm behavior.
  - Confirm no rule was sourced from outside the two referenced documents.

output_format:
  - full_generated_page_object_code
  - brief_assumptions_section
  - brief_compliance_confirmation_citing_both_source_documents
