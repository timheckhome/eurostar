<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Collection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .page {
            max-width: 420px;
            margin: 0 auto;
        }
        .top-links {
            margin-bottom: 14px;
        }
        .top-links a {
            color: #0b5cab;
            text-decoration: none;
        }
        form {
            padding: 18px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
        }
        #submitAddressButton {
            background-color: #2f8f4e;
            color: white;
            cursor: pointer;
        }
        #clearAddressButton {
            background-color: #c0392b;
            color: white;
            cursor: pointer;
        }
        #addressMessage {
            margin-top: 14px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        #addressMessage.success {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
        #addressMessage.error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-links">
            <a id="backToHomeFromAddress" href="index.html">Back to Home</a>
        </div>

        <h1>Address Collection</h1>
        <p>Please provide your mailing details.</p>

        <form id="addressForm">
            <label for="streetAddress">Street Address</label>
            <input type="text" id="streetAddress" placeholder="Enter street address">

            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter city">

            <label for="state">State</label>
            <select id="state">
                <option value="">Select a state</option>
                <option value="CA">California</option>
                <option value="TX">Texas</option>
                <option value="NY">New York</option>
                <option value="FL">Florida</option>
            </select>

            <label for="zipCode">Zip Code</label>
            <input type="text" id="zipCode" placeholder="Enter zip code">

            <button type="button" id="submitAddressButton">Submit Address</button>
            <button type="button" id="clearAddressButton">Clear</button>
        </form>

        <div id="addressMessage"></div>
    </div>

    <script>
        document.getElementById("submitAddressButton").addEventListener("click", () => {
            const street = document.getElementById("streetAddress").value.trim();
            const city = document.getElementById("city").value.trim();
            const state = document.getElementById("state").value;
            const zip = document.getElementById("zipCode").value.trim();
            const message = document.getElementById("addressMessage");

            message.className = "success";
            message.textContent = "Address saved successfully.";
            
            message.style.display = "block";
        });

        document.getElementById("clearAddressButton").addEventListener("click", () => {
            document.getElementById("addressForm").reset();
            const message = document.getElementById("addressMessage");
            message.className = "error";
            message.textContent = "Address form cleared.";
            message.style.display = "block";
        });
    </script>
</body>
</html>
