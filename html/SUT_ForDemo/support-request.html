<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Request</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .page {
            max-width: 420px;
            margin: 0 auto;
        }
        .top-links {
            margin-bottom: 14px;
        }
        .top-links a {
            color: #0b5cab;
            text-decoration: none;
        }
        form {
            padding: 18px;
            border: 1px solid #cccccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea, button {
            width: 100%;
            padding: 8px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 90px;
            resize: vertical;
        }
        #submitSupportButton {
            background-color: #2f8f4e;
            color: white;
            cursor: pointer;
        }
        #supportMessage {
            margin-top: 14px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        #supportMessage.success {
            color: #155724;
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
        #supportMessage.error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-links">
            <a id="backToHomeFromSupport" href="index.html">Back to Home</a>
        </div>

        <h1>Support Request</h1>
        <p>Tell us what issue you are having and we will follow up.</p>

        <form id="supportForm">
            <label for="ticketName">Name</label>
            <input type="text" id="ticketName" placeholder="Enter your name">

            <label for="ticketEmail">Email</label>
            <input type="email" id="ticketEmail" placeholder="Enter your email">

            <label for="issueType">Issue Type</label>
            <select id="issueType">
                <option value="">Select issue type</option>
                <option value="billing">Billing</option>
                <option value="technical">Technical</option>
                <option value="account">Account</option>
            </select>

            <label for="issueDetails">Issue Details</label>
            <textarea id="issueDetails" placeholder="Describe your issue"></textarea>

            <button type="button" id="submitSupportButton">Submit Request</button>
        </form>

        <div id="supportMessage"></div>
    </div>

    <script>
        document.getElementById("submitSupportButton").addEventListener("click", () => {
            const name = document.getElementById("ticketName").value.trim();
            const email = document.getElementById("ticketEmail").value.trim();
            const issueType = document.getElementById("issueType").value;
            const details = document.getElementById("issueDetails").value.trim();
            const message = document.getElementById("supportMessage");

            if (!name || !email || !issueType || !details) {
                message.className = "error";
                message.textContent = "Please complete all support request fields.";
            } else {
                message.className = "success";
                message.textContent = "Support ticket submitted successfully.";
            }

            message.style.display = "block";
        });
    </script>
</body>
</html>
